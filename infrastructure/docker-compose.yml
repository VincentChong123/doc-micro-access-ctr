  # #   networks:
  # #     - ringisho-net


  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    ports:
      - "4040:4040" # Ngrok dashboard
    environment:
      # Docker Compose automatically pulls this from your .env file!
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "api_gateway:3000" # Point ngrok to your dockerized gateway
    depends_on:
      - api_gateway
networks:
  ringisho-net:
    driver: bridge
