version: '3.8'

services:
  api_gateway:
    build:
      context: ../gateway/api_gateway
    container_name: api_gateway
    ports:
      - "3000:3000"
    environment:
      - AI_SERVICE_URL=http://ai_service:8000
      - DOC_SERVICE_URL=http://document_service:4000
    depends_on:
      - ai_service
      # - document_service
    volumes:
      # Mount the docs folder so the Swagger UI can find the contract JSON
      - ../docs:/usr/src/app/docs
    networks:
      - ringisho-net

  ai_service:
    build:
      context: ../services/ai_service
    container_name: ai_service
    ports:
      - "8000:8000"
    environment:
      # Use Application Default Credentials for local development
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/keys/application_default_credentials.json
    volumes:
      # Mount your local gcloud ADC file into the container
      - ./keys/application_default_credentials.json:/app/keys/application_default_credentials.json:ro
    networks:
      - ringisho-net

