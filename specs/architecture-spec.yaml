openapi: 3.0.3
info:
  title: Ringisho Enterprise Platform API
  version: "1.0.0"
  description: "refer spec.md for details"
x-infrastructure:
  docker:
    network_name: "ringisho-net"
  services:
    api_gateway:
      container_name: "api_gateway"
      port: 3000
    ai_service:
      container_name: "ai_service"
      port: 8080
      google_application_credentials_path: "/app/keys/application_default_credentials.json"
    document_service:
      container_name: "document_service"
      port: 4000
    minio:
      container_name: "minio"
      port_api: 9000
      port_console: 9001

servers:
  - url: https://{ngrok_id}.ngrok-free.dev
    description: Public Egress Tunnel (Google Sheets Frontend)
    variables:
      ngrok_id:
        default: supply-various-paralyze

  - url: http://localhost:3000
    description: 🚦 Node.js API Gateway (The Core Router)

paths:
  /api/ai/v1/sheet-chat:
    post:
      summary: Synchronous LLM Generation
      description: |
        **Frontend:** Call `POST /api/ai/v1/sheet-chat`
        **Python Backend:** Listen on `POST /v1/sheet-chat` (Port dynamically assigned via $PORT, local default 8080)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                context:
                  type: string
      responses:
        "200":
          description: Successful AI Generation with Traceability
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                  meta:
                    type: object
                    properties:
                      run_id:
                        type: string
                      latency_ms:
                        type: integer
                      model_invoked:
                        type: string

  /api/workflow/approve:
    post:
      summary: Asynchronous PDF Generation
      description: |
        **Frontend:** Call `POST /api/workflow/approve`
        **Node Backend:** Listen on `POST /approve` (Port 4000)
      responses:
        "200":
          description: PDF generation started
