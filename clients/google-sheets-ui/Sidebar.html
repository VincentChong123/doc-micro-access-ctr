<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        margin: 0;
        padding: 16px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        box-sizing: border-box;
      }
      
      h2 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-top: 0;
        margin-bottom: 16px;
        color: #38bdf8;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .chat-container {
        flex-grow: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      
      .message-card {
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        animation: slideIn 0.3s ease-out;
        backdrop-filter: blur(8px);
      }
      
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .status-badge {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 999px;
        margin-bottom: 8px;
      }
      
      .badge-intercepted { background: #3b82f6; color: white; }
      .badge-warning { background: #eab308; color: #422006; }
      .badge-approved { background: #22c55e; color: white; }
      .badge-rejected { background: #ef4444; color: white; }
      
      .prompt-text {
        font-size: 0.875rem;
        margin-bottom: 8px;
        color: #cbd5e1;
      }
      
      .prompt-label {
        font-weight: 600;
        color: #94a3b8;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      
      button {
        flex: 1;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      .btn-approve {
        background: #38bdf8;
        color: #0f172a;
      }
      
      .btn-approve:hover {
        background: #0ea5e9;
        transform: translateY(-1px);
      }
      
      .btn-reject {
        background: transparent;
        border: 1px solid #64748b;
        color: #f1f5f9;
      }
      
      .btn-reject:hover {
        background: #334155;
      }
      
      .btn-redact {
        background: #fbbf24;
        color: #78350f;
      }
      .btn-redact:hover {
        background: #f59e0b;
      }
      
      .empty-state {
        text-align: center;
        color: #64748b;
        margin-top: 40px;
        font-size: 0.875rem;
      }
      
      /* Loader */
      .loader {
        border: 2px solid #334155;
        border-top: 2px solid #38bdf8;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        animation: spin 1s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 6px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <h2><span class="loader" id="loader"></span> AI Chat Window</h2>
    <div id="chat-container" class="chat-container">
      <div class="empty-state" id="empty-state">
        Listening for `=COMPANY_AI(...)` formulas...<br><br>
        Type a formula in a cell and hit Enter. The request will be intercepted here.
      </div>
    </div>

    <script>
      let processedRequests = new Set();
      
      function pollPendingRequests() {
        google.script.run.withSuccessHandler(handleRequests).getPendingRequests();
      }
      
      function detectPII(contextText) {
        // Simple PII detection (NRIC, Email, Phone)
        const nricRegex = /[STFG]\d{7}[A-Z]/ig;
        const hasNric = nricRegex.test(contextText);
        
        if (hasNric) {
          return {
            hasPII: true,
            type: "NRIC detected",
            redacted: contextText.replace(/[STFG]\d{7}[A-Z]/ig, "[REDACTED_NRIC]")
          };
        }
        return { hasPII: false };
      }
      
      function handleRequests(requests) {
        const container = document.getElementById('chat-container');
        const emptyState = document.getElementById('empty-state');
        
        if (requests.length > 0) {
          emptyState.style.display = 'none';
        }
        
        requests.forEach(req => {
          if (processedRequests.has(req.id)) return;
          processedRequests.add(req.id);
          
          const piiCheck = detectPII(req.context);
          
          const card = document.createElement('div');
          card.className = 'message-card';
          card.id = `card-${req.id}`;
          
          let badgeHtml = `<span class="status-badge badge-intercepted">Intercepted</span>`;
          let piiWarningHtml = '';
          let actionButtonsHtml = '';
          
          if (piiCheck.hasPII) {
            badgeHtml = `<span class="status-badge badge-warning">PII Warning</span>`;
            piiWarningHtml = `
              <div style="color: #fbbf24; font-size: 0.75rem; margin-top: 8px; margin-bottom: 8px;">
                ⚠️ Sensitive data (${piiCheck.type}) found in context. It must be redacted before sending.
              </div>
            `;
            actionButtonsHtml = `
              <button class="btn-redact" onclick="approveRequest('${req.id}', true)">Redact & Approve</button>
              <button class="btn-reject" onclick="rejectRequest('${req.id}')">Reject</button>
            `;
            
            // Store the redacted version globally for this request
            window[`redacted_${req.id}`] = piiCheck.redacted;
          } else {
            actionButtonsHtml = `
              <button class="btn-approve" onclick="approveRequest('${req.id}', false)">Approve</button>
              <button class="btn-reject" onclick="rejectRequest('${req.id}')">Reject</button>
            `;
          }
          
          card.innerHTML = `
            ${badgeHtml}
            <div class="prompt-label">User Prompt</div>
            <div class="prompt-text">"${req.prompt}"</div>
            ${req.context ? `<div class="prompt-label">Context Snippet</div><div class="prompt-text" style="font-size: 0.75rem; opacity: 0.8;">${req.context.substring(0, 100)}${req.context.length > 100 ? '...' : ''}</div>` : ''}
            ${piiWarningHtml}
            <div class="actions" id="actions-${req.id}">
              ${actionButtonsHtml}
            </div>
          `;
          
          container.prepend(card);
        });
      }
      
      function approveRequest(reqId, useRedacted) {
        document.getElementById(`actions-${reqId}`).innerHTML = '<span class="status-badge badge-approved">Approved</span>';
        const redactedContext = useRedacted ? window[`redacted_${reqId}`] : undefined;
        google.script.run.updateRequestStatus(reqId, "APPROVED", redactedContext);
      }
      
      function rejectRequest(reqId) {
        document.getElementById(`actions-${reqId}`).innerHTML = '<span class="status-badge badge-rejected">Rejected</span>';
        google.script.run.updateRequestStatus(reqId, "REJECTED");
      }
      
      // Poll every 2 seconds
      setInterval(pollPendingRequests, 2000);
    </script>
  </body>
</html>
